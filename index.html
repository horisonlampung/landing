<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Redirecting...</title>

<script>
window.onload = function() {

    // coba buka app Instagram
    setTimeout(function() {
        window.location.href =
        "instagram://user?username=horisonlampung";
    },1000);

    // fallback ke web Instagram
    setTimeout(function() {
        window.location.href =
        "https://www.instagram.com/horisonlampung/";
    },3000);

};
</script>

<style>
body{
font-family:Arial,sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
background:#fff;
text-align:center;
padding:20px;
}

.container{
max-width:350px;
}

.button{
display:inline-block;
padding:14px 30px;
background:#E1306C;
color:white;
text-decoration:none;
border-radius:10px;
margin-top:20px;
font-weight:bold;
}
</style>

</head>

<body>

<div class="container">

<h2>Mengalihkan ke Instagram...</h2>

<p>Mohon tunggu beberapa detik</p>

href="https://www.instagram.com/horisonlampung/">

Buka Instagram

</div>

</html>
