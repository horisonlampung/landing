<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Horison Lampung</title>

<script>

window.onload = function(){

let ua = navigator.userAgent.toLowerCase();

let isAndroid = ua.includes("android");
let isPixel = ua.includes("pixel");
let isIphone = ua.includes("iphone") || ua.includes("ipad");

// Android selain Pixel
if(isAndroid && !isPixel){

setTimeout(function(){

window.location.href=
"intent://instagram.com/_u/horisonlampung#Intent;package=com.instagram.android;scheme=https;end";

},1000);

}

// iPhone
else if(isIphone){

setTimeout(function(){

window.location.href=
"instagram://user?username=horisonlampung";

},1000);

}

// fallback untuk semua
setTimeout(function(){

window.location.replace(
"https://www.instagram.com/horisonlampung/"
);

},2500);

}

</script>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:#fff;
text-align:center;
}

.box{
padding:20px;
max-width:350px;
}

.button{
display:inline-block;
padding:14px 30px;
background:#E1306C;
color:white;
text-decoration:none;
border-radius:10px;
margin-top:20px;
}

</style>

</head>

<body>

<div class="box">

<h2>Membuka Instagram...</h2>

<p>Jika tidak terbuka otomatis, tekan tombol di bawah</p>

<a class="button"
href="https://www.instagram.com/horisonlampung/">

Buka Instagram

</a>

</div>

</body>
</html>
