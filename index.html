<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Horison Lampung</title>

<style>

html,body{

margin:0;
height:100%;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial;
background:#fff;

}

.loader{

width:60px;
height:60px;

border:6px solid #eee;
border-top:6px solid #D81B60;

border-radius:50%;

animation:spin 1s linear infinite;

}

@keyframes spin{

100%{

transform:rotate(360deg);

}

}

</style>

</head>

<body>

<div align="center">

<div class="loader"></div>

<p>Membuka Instagram...</p>

</div>

<script>

const ua=navigator.userAgent.toLowerCase();

const isAndroid=ua.includes("android");

const isPixel=ua.includes("pixel");

const isiPhone=/iphone|ipad|ipod/.test(ua);

const igWeb="https://www.instagram.com/horisonlampung/";

const igUniversal="https://www.instagram.com/_u/horisonlampung/";


// PIXEL

if(isPixel){

window.location.replace(igWeb);

}


// DESKTOP

else if(
ua.includes("windows")
||
ua.includes("macintosh")
){

window.location.replace(igWeb);

}


// ANDROID

else if(isAndroid){

setTimeout(function(){

window.location.href=
"intent://instagram.com/_u/horisonlampung#Intent;package=com.instagram.android;scheme=https;end";

},300);

setTimeout(function(){

window.location.replace(igWeb);

},1800);

}


// IPHONE

else if(isiPhone){

setTimeout(function(){

window.location.replace(
igUniversal
);

},300);

setTimeout(function(){

window.location.replace(
igWeb
);

},2200);

}


// UNKNOWN

else{

window.location.replace(igWeb);

}

</script>

</body>

</html>
