<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Opening Instagram...</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,body{

width:100%;
height:100%;

background:#ffffff;

font-family:Arial,Helvetica,sans-serif;

display:flex;
justify-content:center;
align-items:center;

}

.container{

text-align:center;
padding:30px;

}

.loader{

width:65px;
height:65px;

margin:auto;

border:6px solid #ececec;
border-top:6px solid #E1306C;

border-radius:50%;

animation:spin 1s linear infinite;

}

@keyframes spin{

100%{
transform:rotate(360deg);
}

}

h2{

margin-top:25px;
font-size:24px;

}

p{

margin-top:10px;
color:#666;

}

.button{

display:inline-block;

margin-top:28px;

padding:15px 30px;

background:#E1306C;

color:white;

text-decoration:none;

border-radius:10px;

font-weight:bold;

}

</style>

</head>

<body>

<div class="container">

<div class="loader"></div>

<h2>Membuka Instagram...</h2>

<p>Mohon tunggu sebentar...</p>

<a
class="button"
id="manualButton"
href="https://www.instagram.com/horisonlampung/"
>

Buka Instagram

</a>

</div>

<script>

const ua=navigator.userAgent.toLowerCase();

const isAndroid=ua.includes("android");

const isiPhone=/iphone|ipad|ipod/.test(ua);

const isDesktop=
ua.includes("windows")||
ua.includes("macintosh")||
(ua.includes("linux")&&!isAndroid);

const WEB="https://www.instagram.com/horisonlampung/";

const IOS_LINK="https://www.instagram.com/_u/horisonlampung/";

const ANDROID_LINK="instagram://user?username=horisonlampung";


// ===========================
// DESKTOP
// ===========================

if(isDesktop){

window.location.replace(WEB);

}


// ===========================
// IPHONE
// ===========================

else if(isiPhone){

setTimeout(function(){

window.location.assign(IOS_LINK);

},250);


setTimeout(function(){

window.location.assign(WEB);

},1800);

}


// ===========================
// ANDROID
// ===========================

else if(isAndroid){

setTimeout(function(){

window.location.assign(ANDROID_LINK);

},250);


setTimeout(function(){

window.location.assign(WEB);

},800);

}


// ===========================
// UNKNOWN DEVICE
// ===========================

else{

window.location.assign(WEB);

}

</script>

</body>

</html>
