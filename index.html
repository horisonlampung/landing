<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Opening Instagram...</title>

<style>

html,body{

margin:0;
padding:0;
width:100%;
height:100%;

display:flex;
justify-content:center;
align-items:center;

background:#fff;

font-family:Arial,sans-serif;

}

.box{

text-align:center;

}

.loader{

width:60px;
height:60px;

border:6px solid #eee;
border-top:6px solid #E1306C;

border-radius:50%;

margin:auto;

animation:spin 1s linear infinite;

}

@keyframes spin{

100%{

transform:rotate(360deg);

}

}

a{

display:inline-block;

margin-top:30px;

padding:14px 30px;

background:#E1306C;

color:white;

text-decoration:none;

border-radius:10px;

font-weight:bold;

}

</style>

</head>

<body>

<div class="box">

<div class="loader"></div>

<h2>Membuka Instagram...</h2>

<p>Mohon tunggu sebentar</p>

<a id="btn"
href="https://www.instagram.com/horisonlampung/">

Buka Instagram

</a>

</div>

<script>

const ua=navigator.userAgent.toLowerCase();

const isDesktop =
ua.includes("windows") ||
ua.includes("macintosh") ||
(ua.includes("linux") && !ua.includes("android"));

const APP_LINK =
"https://www.instagram.com/_u/horisonlampung/";

const WEB_LINK =
"https://www.instagram.com/horisonlampung/";

// Desktop
if(isDesktop){

    window.location.replace(WEB_LINK);

}

// Mobile
else{

    // Universal Link
    setTimeout(function(){

        window.location.assign(APP_LINK);

    },300);

    // Fallback ke Web
    setTimeout(function(){

        window.location.assign(WEB_LINK);

    },1800);

}

</script>

</body>

</html>
