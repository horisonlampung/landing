<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Horison Lampung</title>

<script>

window.onload = function(){

let ua = navigator.userAgent.toLowerCase();

if(ua.includes("android")){

    // Android / Pixel
    setTimeout(function(){

        window.location.href =
        "intent://instagram.com/_u/horisonlampung#Intent;package=com.instagram.android;scheme=https;end";

    },800);

}
else{

    // iPhone
    setTimeout(function(){

        window.location.href =
        "instagram://user?username=horisonlampung";

    },800);

}

// fallback ke web Instagram
setTimeout(function(){

window.location.replace(
"https://www.instagram.com/horisonlampung/"
);

},3000);

};

</script>

<style>

body{
font-family:Arial,sans-serif;
margin:0;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
text-align:center;
background:#fff;
}

.container{
padding:20px;
max-width:350px;
}

.button{
display:inline-block;
padding:14px 30px;
background:#E1306C;
color:#fff;
text-decoration:none;
border-radius:10px;
margin-top:20px;
}

</style>

</head>

<body>

<div class="container">

<h2>Membuka Instagram...</h2>

<p>Jika tidak otomatis, tekan tombol di bawah</p>

<a class="button"
href="https://www.instagram.com/horisonlampung/">

Buka Instagram

</a>

</div>

</body>
</html>
